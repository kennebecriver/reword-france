<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reword Mini</title>
    <style>
        :root {
            --bg: #0f1115;
            --card-bg: #1c1f26;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text-main); 
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; height: 100vh;
        }

        /* Views Control */
        .view { display: none; height: 100vh; flex-direction: column; }
        .view.active { display: flex; }

        /* Header */
        .header { 
            padding: 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }
        .header h1 { font-size: 1.2rem; margin: 0; }
        .back-btn { background: none; border: none; color: var(--accent); font-size: 1.5rem; cursor: pointer; }

        /* Topics List */
        .topics-grid { padding: 15px; overflow-y: auto; display: grid; gap: 12px; }
        .topic-card { 
            background: var(--card-bg); padding: 20px; border-radius: 16px;
            border: 1px solid var(--border); cursor: pointer;
        }

        /* Card Stage */
        #card-stage {
            position: relative; flex: 1; margin: 20px 20px 40px;
            perspective: 1000px;
        }

        .card {
            position: absolute; inset: 0;
            background: var(--card-bg); border-radius: 28px;
            border: 1px solid var(--border); padding: 30px;
            display: flex; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transform: translate(var(--x, 0), var(--y, 0)) rotate(var(--r, 0));
            touch-action: none; user-select: none;
        }

        .card.animating { transition: transform 0.4s cubic-bezier(0.15, 0.3, 0.25, 1), opacity 0.4s; }

        .card-active { z-index: 2; opacity: 1; }
        .card-next { z-index: 1; transform: scale(0.94) translateY(15px); opacity: 0.4; }

        /* Card Content */
        .card-main { font-size: 1.6rem; font-weight: 600; line-height: 1.3; margin-bottom: auto; }
        .card-sub { font-size: 1.3rem; color: var(--accent); margin-top: 10px; display: none; }
        
        .eye-btn {
            margin: auto; width: 70px; height: 70px; border-radius: 20px;
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            color: var(--text-muted); font-size: 28px; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
        }

        /* Loader */
        .loader-container { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .loader { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="view-loading" class="view active">
        <div class="loader-container">
            <div class="loader"></div>
            <p id="loading-msg" style="margin-top: 20px; color: var(--text-muted)">Loading spreadsheet...</p>
        </div>
    </div>

    <div id="view-topics" class="view">
        <div class="header"><h1>Мои карточки</h1></div>
        <div id="topics-grid" class="topics-grid"></div>
    </div>

    <div id="view-deck" class="view">
        <div class="header">
            <button class="back-btn" onclick="showView('topics')">✕</button>
            <h1 id="deck-title">Deck</h1>
            <span id="deck-counter" style="color: var(--text-muted)">0</span>
        </div>
        <div id="card-stage"></div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const CONFIG = {
            apiKey: params.get('key'),
            sheetId: params.get('id')
        };

        let appData = {};
        let currentSession = [];

        // --- API LAYER ---
        const api = {
            async fetchData() {
                if (!CONFIG.apiKey || !CONFIG.sheetId) throw new Error("Missing URL parameters (key/id)");

                // 1. Получаем список листов
                const metaRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.sheetId}?key=${CONFIG.apiKey}`);
                const meta = await metaRes.json();
                if (meta.error) throw new Error(meta.error.message);

                const sheetNames = meta.sheets.map(s => s.properties.title);
                
                // 2. Получаем данные всех листов сразу
                const ranges = sheetNames.map(name => `${name}!A1:B1000`).join('&ranges=');
                const dataRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.sheetId}/values:batchGet?key=${CONFIG.apiKey}&ranges=${ranges}`);
                const dataJSON = await dataRes.json();

                const result = {};
                dataJSON.valueRanges.forEach((range, idx) => {
                    const name = sheetNames[idx];
                    const rows = range.values || [];
                    const cards = rows
                        .filter(row => row[0] && row[0] !== "text1")
                        .map(row => ({ text1: row[0], text2: row[1] || "" }));
                    
                    if (cards.length > 0) result[name] = cards;
                });
                return result;
            }
        };

        // --- ENGINE ---
        const Engine = {
            THRESHOLD: 120,

            initDeck(name) {
                currentSession = [...appData[name]];
                document.getElementById('deck-title').textContent = name;
                document.getElementById('card-stage').innerHTML = '';
                this.updateCounter();
                this.spawn();
                showView('deck');
            },

            spawn() {
                const stage = document.getElementById('card-stage');
                // Поддерживаем 2 карты в DOM
                while (stage.children.length < 2 && currentSession.length > 0) {
                    const data = currentSession.shift();
                    const cardEl = this.createCardEl(data);
                    stage.prepend(cardEl); // Новая карта всегда снизу
                }

                // Активируем верхнюю карту
                const top = stage.lastElementChild;
                if (top && !top.classList.contains('card-active')) {
                    top.className = 'card card-active animating';
                    this.bindEvents(top, top.dataset); 
                }

                // Стилизуем нижнюю
                const next = stage.firstElementChild;
                if (next && next !== top) {
                    next.className = 'card card-next animating';
                }
            },

            createCardEl(data) {
                const div = document.createElement('div');
                div.className = 'card card-next';
                // Сохраняем данные прямо в DOM-узле для простоты
                div.dataset.t1 = data.text1;
                div.dataset.t2 = data.text2;
                
                div.innerHTML = `
                    <div class="card-main">${data.text1}</div>
                    <div class="card-sub">${data.text2}</div>
                    <div class="eye-btn">👁</div>
                `;

                const btn = div.querySelector('.eye-btn');
                const sub = div.querySelector('.card-sub');
                
                btn.onpointerdown = (e) => e.stopPropagation();
                btn.onclick = () => {
                    btn.style.display = 'none';
                    sub.style.display = 'block';
                };

                return div;
            },

            bindEvents(el, data) {
                let start = { x: 0, y: 0 };
                let current = { x: 0, y: 0 };

                const move = (e) => {
                    current.x = e.clientX - start.x;
                    current.y = e.clientY - start.y;
                    el.style.setProperty('--x', `${current.x}px`);
                    el.style.setProperty('--y', `${current.y}px`);
                    el.style.setProperty('--r', `${current.x * 0.05}deg`);
                };

                const up = () => {
                    document.removeEventListener('pointermove', move);
                    document.removeEventListener('pointerup', up);
                    el.classList.add('animating');

                    if (Math.abs(current.x) > this.THRESHOLD) {
                        this.swipe(el, current.x > 0 ? 'right' : 'left', data);
                    } else {
                        el.style.setProperty('--x', `0px`);
                        el.style.setProperty('--y', `0px`);
                        el.style.setProperty('--r', `0deg`);
                    }
                };

                el.onpointerdown = (e) => {
                    start = { x: e.clientX, y: e.clientY };
                    current = { x: 0, y: 0 };
                    el.classList.remove('animating');
                    document.addEventListener('pointermove', move);
                    document.addEventListener('pointerup', up);
                };
            },

            swipe(el, dir, data) {
                const outX = dir === 'right' ? 1000 : -1000;
                el.style.setProperty('--x', `${outX}px`);
                el.style.opacity = '0';

                // Если вправо — возвращаем в конец очереди
                if (dir === 'right') {
                    currentSession.push({ text1: data.t1, text2: data.t2 });
                }

                setTimeout(() => {
                    el.remove();
                    this.updateCounter();
                    this.spawn();
                }, 400);
            },

            updateCounter() {
                const total = currentSession.length + document.getElementById('card-stage').children.length;
                document.getElementById('deck-counter').textContent = total;
                if (total === 0) showView('topics');
            }
        };

        // --- UI CONTROL ---
        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${id}`).classList.add('active');
        }

        function renderTopics() {
            const grid = document.getElementById('topics-grid');
            grid.innerHTML = '';
            Object.keys(appData).forEach(name => {
                const div = document.createElement('div');
                div.className = 'topic-card';
                div.innerHTML = `<strong>${name}</strong><div style="color:var(--text-muted); font-size:0.8rem; margin-top:5px">${appData[name].length} cards</div>`;
                div.onclick = () => Engine.initDeck(name);
                grid.appendChild(div);
            });
        }

        // --- STARTUP ---
        window.onload = async () => {
            try {
                appData = await api.fetchData();
                renderTopics();
                showView('topics');
            } catch (err) {
                document.getElementById('loading-msg').innerHTML = `<span style="color:#ff6b6b">Error: ${err.message}</span>`;
            }
        };
    </script>
</body>
</html>
