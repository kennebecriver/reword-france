<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flashcards App</title>
  <style>
    /* --- БАЗОВЫЕ СТИЛИ И ПЕРЕМЕННЫЕ --- */
    :root {
      --bg-color: #181818;
      --card-bg: #222222;
      --text-main: #E0E0E0;
      --text-muted: #888888;
      --accent-soft: #333333;
      --accent-blue: #4A90E2;
      --border-color: #3d3d3d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      height: 100dvh; /* Используем dvh для мобильных браузеров */
      display: flex;
      flex-direction: column;
      overflow: hidden;
      touch-action: none;
    }

    /* --- СИСТЕМА ЭКРАНОВ (ВЬЮ) --- */
    .view {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .view.active { display: flex; }

    /* --- ЭКРАН ЗАГРУЗКИ --- */
    .loader {
      width: 40px; height: 40px;
      border: 3px solid var(--border-color);
      border-top-color: var(--text-main);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- ЭКРАН ТОПИКОВ --- */
    #topics-container {
      width: 90vw; max-width: 500px;
      display: flex; flex-direction: column; gap: 15px;
    }
    .topic-item {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 20px; border-radius: 16px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; transition: background 0.2s;
    }
    .topic-item:active { background: var(--accent-soft); }
    .topic-name-list { font-size: 1.2rem; font-weight: 500; }
    .topic-count { color: var(--text-muted); font-size: 0.9rem; }

    /* --- ЭКРАН КОЛОДЫ: ШАПКА --- */
    #deck-header {
      width: 90vw; max-width: 500px;
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 0;
      position: absolute; top: 0; z-index: 10;
    }
    .icon-btn {
      background: transparent; border: none; color: var(--text-main);
      font-size: 1.5rem; cursor: pointer; padding: 5px;
      display: flex; align-items: center; justify-content: center;
    }

    /* --- ЭКРАН КОЛОДЫ: КОНТЕЙНЕР --- */
    #deck-container {
      position: relative;
      width: 90vw;
      height: 80vh;
      max-width: 500px;
      perspective: 1000px;
      margin-bottom: 20px;
    }

    /* --- КАРТОЧКА --- */
    .card {
      position: absolute;
      inset: 0;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      will-change: transform, opacity;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    .card.dragging { transition: none; }
    .card:not(:last-child) { transform: scale(0.96) translateY(10px); opacity: 0.5; }

    /* Внутренности карточки */
    .card-content {
      flex: 1; padding: 24px;
      display: flex; flex-direction: column;
      user-select: none;
    }
    
    .card-top-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .card-topic-label { color: var(--text-muted); font-size: 0.8rem; text-transform: lowercase; margin-bottom: 12px; }
    .card-text-primary { font-size: 1.8rem; font-weight: 400; line-height: 1.3; }
    
    .play-btn {
      background: transparent; border: none; cursor: pointer;
      color: var(--accent-blue); font-size: 1.8rem;
      padding: 0; margin-left: 15px; display: flex; align-items: center;
    }

    .card-center-area {
      flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    .reveal-btn {
      width: 64px; height: 64px;
      background: transparent; border: 1px solid var(--border-color); border-radius: 16px;
      color: var(--text-muted); font-size: 1.5rem; cursor: pointer;
      display: flex; justify-content: center; align-items: center;
      transition: background 0.2s, color 0.2s;
    }
    .reveal-btn:active { background: var(--accent-soft); color: var(--text-main); }
    
    .card-text-secondary {
      font-size: 1.2rem; color: var(--text-muted); font-style: italic;
      margin-top: 20px; text-align: center; display: none; /* Скрыто по умолчанию */
    }

    /* Нижние кнопки карточки */
    .card-actions {
      display: flex; gap: 1px;
      background-color: var(--border-color);
      height: 70px; border-top: 1px solid var(--border-color);
    }
    .action-btn {
      flex: 1; background-color: var(--card-bg); border: none; color: var(--text-muted);
      font-size: 0.85rem; font-weight: 500; cursor: pointer;
      display: flex; justify-content: center; align-items: center; gap: 8px;
    }
    .action-btn:active { background-color: var(--accent-soft); }
  </style>
</head>
<body>

  <div id="view-loading" class="view active">
    <div class="loader"></div>
  </div>

  <div id="view-topics" class="view">
    <div id="topics-container">
      </div>
  </div>

  <div id="view-deck" class="view">
    <div id="deck-header">
      <button class="icon-btn" id="btn-back">←</button>
      <div id="deck-counter" style="font-weight: 500;">0</div>
    </div>
    <div id="deck-container">
      </div>
  </div>

  <script>
    /* =========================================
       1. СЛОЙ ДАННЫХ (API MOCK)
       ========================================= */
    const api = {
      fetchData: () => {
        return new Promise(resolve => {
          setTimeout(() => {
            resolve({
              "topic_1": {
                name: "French Verbs",
                cards: [
                  { text1: "Je regarde la télé.", text2: "Я смотрю телевизор.", res1: "", res2: "" },
                  { text1: "Tu parles bien.", text2: "Ты хорошо говоришь.", res1: "", res2: "" },
                  { text1: "Il mange une pomme.", text2: "Он ест яблоко.", res1: "", res2: "" }
                ]
              },
              "topic_2": {
                name: "English Idioms",
                cards: [
                  { text1: "Bite the bullet", text2: "Стиснуть зубы / Смириться", res1: "", res2: "" },
                  { text1: "Under the weather", text2: "Чувствовать себя неважно", res1: "", res2: "" }
                ]
              }
            });
          }, 1000); // Эмуляция сетевой задержки 1 сек
        });
      }
    };

    /* =========================================
       2. СОСТОЯНИЕ И НАВИГАЦИЯ (APP STATE)
       ========================================= */
    let appData = {};
    let currentCardsRemaining = 0;

    const views = {
      loading: document.getElementById('view-loading'),
      topics: document.getElementById('view-topics'),
      deck: document.getElementById('view-deck')
    };

    function showView(viewName) {
      Object.values(views).forEach(v => v.classList.remove('active'));
      views[viewName].classList.add('active');
    }

    /* =========================================
       3. РЕНДЕР ЭКРАНОВ
       ========================================= */
    
    // Экран топиков
    function renderTopics(data) {
      const container = document.getElementById('topics-container');
      container.innerHTML = '';
      
      Object.keys(data).forEach(topicId => {
        const topic = data[topicId];
        const el = document.createElement('div');
        el.className = 'topic-item';
        el.innerHTML = `
          <span class="topic-name-list">${topic.name}</span>
          <span class="topic-count">${topic.cards.length} cards</span>
        `;
        el.onclick = () => initDeckScreen(topic);
        container.appendChild(el);
      });
    }

    // Экран колоды
    const deckContainer = document.getElementById('deck-container');
    const counterEl = document.getElementById('deck-counter');

    function updateCounter(count) {
      currentCardsRemaining = count;
      counterEl.textContent = currentCardsRemaining;
    }

    function initDeckScreen(topic) {
      showView('deck');
      deckContainer.innerHTML = '';
      updateCounter(topic.cards.length);
      
      // Рендерим с конца, чтобы первая карта была сверху в DOM
      [...topic.cards].reverse().forEach(cardObj => {
        deckContainer.appendChild(createCardElement(topic.name, cardObj));
      });
      setupTopCard();
    }

    // Обработчик "Play" (Заглушка)
    function onPlayAudio(cardObj) {
      console.log("Playing audio for:", cardObj.text1);
      // Здесь позже будет логика воспроизведения
    }

    // Создание DOM элемента карточки
    function createCardElement(topicName, cardObj) {
      const card = document.createElement('div');
      card.className = 'card';
      
      // Внутренняя структура карточки
      card.innerHTML = `
        <div class="card-content">
          <div class="card-topic-label">${topicName}</div>
          <div class="card-top-row">
            <div class="card-text-primary">${cardObj.text1}</div>
            <button class="play-btn">▶</button>
          </div>
          <div class="card-center-area">
            <button class="reveal-btn">👁</button>
            <div class="card-text-secondary">${cardObj.text2}</div>
          </div>
        </div>
        <div class="card-actions">
          <button class="action-btn" data-action="left">‹ Удалить</button>
          <button class="action-btn" data-action="right">В конец ›</button>
        </div>
      `;

      // Изолированные обработчики внутри карточки
      const playBtn = card.querySelector('.play-btn');
      const revealBtn = card.querySelector('.reveal-btn');
      const textSecondary = card.querySelector('.card-text-secondary');

      // Stop propagation чтобы клик не вызывал начало свайпа
      playBtn.onpointerdown = (e) => e.stopPropagation(); 
      playBtn.onclick = () => onPlayAudio(cardObj);

      revealBtn.onpointerdown = (e) => e.stopPropagation();
      revealBtn.onclick = () => {
        revealBtn.style.display = 'none';
        textSecondary.style.display = 'block';
      };

      // Нижние кнопки
      card.querySelectorAll('.action-btn').forEach(btn => {
        btn.onpointerdown = (e) => e.stopPropagation();
        btn.onclick = () => swipeCard(btn.dataset.action);
      });

      return card;
    }

    /* =========================================
       4. ЛОГИКА СВАЙПОВ (DECK CONTROLLER)
       ========================================= */
    let activeCard = null;
    let startX = 0, startY = 0, currentX = 0, currentY = 0;
    let isDragging = false;
    const THRESHOLD = window.innerWidth * 0.25;

    function setupTopCard() {
      const cards = deckContainer.querySelectorAll('.card');
      if (cards.length === 0) return;
      
      activeCard = cards[cards.length - 1];
      activeCard.style.opacity = "1";
      activeCard.style.transform = "scale(1) translateY(0)";
      activeCard.onpointerdown = handlePointerDown;
    }

    function handlePointerDown(e) {
      // Игнорируем клики по кнопкам (они остановлены через stopPropagation)
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      activeCard.classList.add('dragging');
      activeCard.setPointerCapture(e.pointerId);
      
      activeCard.onpointermove = handlePointerMove;
      activeCard.onpointerup = handlePointerUp;
      activeCard.onpointercancel = handlePointerUp;
    }

    function handlePointerMove(e) {
      if (!isDragging) return;
      currentX = e.clientX - startX;
      currentY = e.clientY - startY;
      const rotation = currentX * 0.05;
      activeCard.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotation}deg)`;
    }

    function handlePointerUp() {
      if (!isDragging) return;
      isDragging = false;
      activeCard.classList.remove('dragging');
      
      if (Math.abs(currentX) > THRESHOLD) {
        swipeCard(currentX > 0 ? 'right' : 'left');
      } else {
        activeCard.style.transform = ''; // Возврат в центр
      }
      currentX = 0;
      activeCard.onpointermove = null;
    }

    function swipeCard(direction) {
      if (!activeCard) return;
      
      const moveX = direction === 'right' ? window.innerWidth * 1.5 : -window.innerWidth * 1.5;
      activeCard.style.transform = `translate(${moveX}px, ${currentY}px) rotate(${direction === 'right' ? 20 : -20}deg)`;
      activeCard.style.opacity = '0';

      const cardToMove = activeCard;
      activeCard.onpointerdown = null; // снимаем слушатель

      // Обновляем счетчик СРАЗУ при свайпе влево
      if (direction === 'left') {
        updateCounter(currentCardsRemaining - 1);
      }

      setTimeout(() => {
        if (direction === 'left') {
          cardToMove.remove();
        } else {
          // Вправо: возвращаем в низ колоды и сбрасываем состояние глазика
          cardToMove.style.transition = 'none';
          cardToMove.style.transform = '';
          cardToMove.style.opacity = '0';
          
          // Сброс видимости text2
          cardToMove.querySelector('.reveal-btn').style.display = 'flex';
          cardToMove.querySelector('.card-text-secondary').style.display = 'none';

          deckContainer.prepend(cardToMove);
          setTimeout(() => cardToMove.style.transition = '', 50);
        }
        setupTopCard();
      }, 300);
    }

    /* =========================================
       5. ИНИЦИАЛИЗАЦИЯ ПРИЛОЖЕНИЯ
       ========================================= */
    
    // Кнопка Назад из колоды
    document.getElementById('btn-back').onclick = () => {
      showView('topics');
      deckContainer.innerHTML = ''; // Очищаем память
    };

    // Старт
    api.fetchData().then(data => {
      appData = data;
      renderTopics(appData);
      showView('topics');
    });

  </script>
</body>
</html>
