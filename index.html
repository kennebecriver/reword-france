<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Premium Card Deck</title>
  <style>
    :root {
      --bg-color: #181818;
      --card-bg: #222222;
      --text-main: #E0E0E0;
      --accent-soft: #333333;
      --border-color: #3d3d3d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      touch-action: none;
    }

    #deck-container {
      position: relative;
      width: 90vw;
      height: 80vh;
      max-width: 500px;
      perspective: 1000px;
      margin-bottom: 20px;
    }

    .card {
      position: absolute;
      inset: 0;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      will-change: transform, opacity;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    /* Контент карточки */
    .card-content {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.5rem;
      letter-spacing: 0.5px;
      font-weight: 300;
      padding: 20px;
      text-align: center;
      user-select: none;
    }

    /* Контейнер для кнопок внутри карточки */
    .card-actions {
      display: flex;
      gap: 1px; /* Тонкая линия разделения */
      background-color: var(--border-color);
      height: 80px;
      border-top: 1px solid var(--border-color);
    }

    .action-btn {
      flex: 1;
      background-color: var(--card-bg);
      border: none;
      color: var(--text-main);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .action-btn:active {
      background-color: var(--accent-soft);
    }

    /* Состояния колоды */
    .card.dragging {
      transition: none;
    }

    /* Индикатор глубины для нижних карточек */
    .card:not(:last-child) {
      transform: scale(0.96) translateY(10px);
      opacity: 0.5;
    }
  </style>
</head>
<body>

  <div id="deck-container"></div>

  <script>
    const container = document.getElementById('deck-container');
    let cardsData = ['Карточка 1', 'Карточка 2', 'Карточка 3', 'Карточка 4', 'Карточка 5'];
    
    let activeCard = null;
    let startX = 0, startY = 0, currentX = 0, currentY = 0;
    let isDragging = false;
    const THRESHOLD = window.innerWidth * 0.3; // 30% экрана для свайпа

    function createCard(text) {
      const card = document.createElement('div');
      card.className = 'card';
      
      card.innerHTML = `
        <div class="card-content">${text}</div>
        <div class="card-actions">
          <button class="action-btn" data-action="left">Удалить</button>
          <button class="action-btn" data-action="right">В конец</button>
        </div>
      `;

      // Обработка кнопок
      card.querySelectorAll('.action-btn').forEach(btn => {
        btn.onclick = (e) => {
          e.stopPropagation();
          swipe(btn.dataset.action);
        };
      });

      return card;
    }

    function init() {
      // Очистка и заполнение (в обратном порядке для стека)
      container.innerHTML = '';
      [...cardsData].reverse().forEach(text => {
        container.appendChild(createCard(text));
      });
      setupTopCard();
    }

    function setupTopCard() {
      const cards = container.querySelectorAll('.card');
      if (cards.length === 0) return;
      
      activeCard = cards[cards.length - 1];
      activeCard.style.opacity = "1";
      activeCard.style.transform = "scale(1) translateY(0)";
      
      activeCard.onpointerdown = handleStart;
    }

    function handleStart(e) {
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      activeCard.classList.add('dragging');
      activeCard.setPointerCapture(e.pointerId);
      
      activeCard.onpointermove = handleMove;
      activeCard.onpointerup = handleEnd;
      activeCard.onpointercancel = handleEnd;
    }

    function handleMove(e) {
      if (!isDragging) return;
      currentX = e.clientX - startX;
      currentY = e.clientY - startY;
      
      const rotation = currentX * 0.05;
      activeCard.style.transform = `translate(${currentX}px, ${currentY}px) rotate(${rotation}deg)`;
    }

    function handleEnd() {
      if (!isDragging) return;
      isDragging = false;
      activeCard.classList.remove('dragging');
      
      if (Math.abs(currentX) > THRESHOLD) {
        swipe(currentX > 0 ? 'right' : 'left');
      } else {
        activeCard.style.transform = '';
      }
      
      currentX = 0;
      activeCard.onpointermove = null;
    }

    function swipe(direction) {
      if (!activeCard) return;
      
      const moveX = direction === 'right' ? window.innerWidth * 1.5 : -window.innerWidth * 1.5;
      activeCard.style.transform = `translate(${moveX}px, ${currentY}px) rotate(${direction === 'right' ? 20 : -20}deg)`;
      activeCard.style.opacity = '0';

      const cardToMove = activeCard;
      activeCard.onpointerdown = null;

      setTimeout(() => {
        if (direction === 'left') {
          cardToMove.remove();
        } else {
          // Перенос в конец колоды
          cardToMove.style.transition = 'none';
          cardToMove.style.transform = '';
          cardToMove.style.opacity = '0';
          container.prepend(cardToMove);
          // Небольшая задержка, чтобы transition не подхватил сброс координат
          setTimeout(() => cardToMove.style.transition = '', 50);
        }
        setupTopCard();
      }, 400);
    }

    init();
  </script>
</body>
</html>
