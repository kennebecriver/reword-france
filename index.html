<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Flashcards App Pro</title>
  <style>
    :root {
      --bg-color: #181818;
      --card-bg: #222222;
      --text-main: #E0E0E0;
      --text-muted: #888888;
      --accent-soft: #333333;
      --accent-blue: #4A90E2;
      --border-color: #3d3d3d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      touch-action: none;
    }

    /* --- СИСТЕМА ЭКРАНОВ --- */
    .view { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; }
    .view.active { display: flex; }
    #view-loading { justify-content: center; }

    /* --- ЭКРАН ЗАГРУЗКИ --- */
    .loader {
      width: 30px; height: 30px;
      border: 2px solid var(--border-color);
      border-top-color: var(--text-main);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* --- ЭКРАН ТОПИКОВ --- */
    #view-topics { padding-top: 40px; }
    #topics-container { width: 90vw; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
    .topic-item {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      padding: 20px; border-radius: 16px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer;
    }
    .topic-item:active { background: var(--accent-soft); }
    .topic-count { color: var(--text-muted); font-size: 0.85rem; }

    /* --- ЭКРАН КОЛОДЫ: ШАПКА --- */
    #deck-header {
      width: 90vw; max-width: 500px;
      display: grid;
      grid-template-columns: 40px 1fr 40px; /* Сетка для идеального центрирования */
      align-items: center;
      padding: 20px 0;
      z-index: 10;
    }
    #header-topic-title { 
      text-align: center; 
      color: var(--text-muted); 
      font-size: 0.8rem; 
      text-transform: lowercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #deck-counter { text-align: right; font-size: 0.9rem; font-weight: 500; }

    .icon-btn {
      background: transparent; border: none; color: var(--text-main);
      font-size: 1.4rem; cursor: pointer; display: flex; align-items: center;
    }

    /* --- КОНТЕЙНЕР КОЛОДЫ --- */
    #deck-container {
      position: relative;
      width: 90vw;
      height: 80vh;
      max-width: 500px;
      perspective: 1000px;
    }

    /* --- КАРТОЧКА --- */
    .card {
      position: absolute;
      inset: 0;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      will-change: transform, opacity;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    }
    .card.dragging { transition: none; }
    .card:not(:last-child) { transform: scale(0.96) translateY(10px); opacity: 0.4; }

    /* Контент карточки (Левое выравнивание) */
    .card-body {
      flex: 1; padding: 32px 24px;
      display: flex; flex-direction: column;
      align-items: flex-start; /* Все по левому краю */
      user-select: none;
    }
    
    .card-main-row { width: 100%; display: flex; justify-content: space-between; align-items: flex-start; }
    .card-text-primary { font-size: 1.7rem; font-weight: 400; line-height: 1.2; text-align: left; flex: 1; }
    
    .play-btn {
      background: transparent; border: none; color: var(--accent-blue);
      font-size: 1.6rem; margin-left: 15px; cursor: pointer;
    }

    .card-text-secondary {
      font-size: 1.15rem; color: var(--text-muted);
      margin-top: 16px; text-align: left;
      display: none; width: 100%;
    }

    /* Зона глаза */
    .card-eye-zone {
      flex: 1;           /* Занимает всё оставшееся пространство карточки */
      width: 100%; 
      display: flex; 
      justify-content: center; 
      align-items: center; /* Центровка по вертикали и горизонтали */
    }
    .reveal-btn {
      width: 156px; height: 156px;
      background: transparent; border: 1px solid var(--border-color); border-radius: 14px;
      color: var(--text-muted); font-size: 3rem; cursor: pointer;
      display: flex; justify-content: center; align-items: center;
    }

    /* Кнопки действий */
    .card-actions {
      display: flex; gap: 1px;
      background-color: var(--border-color);
      height: 70px; border-top: 1px solid var(--border-color);
    }
    .action-btn {
      flex: 1; background-color: var(--card-bg); border: none; color: var(--text-muted);
      font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .action-btn:active { background-color: var(--accent-soft); }
  </style>
</head>
<body>

  <div id="view-loading" class="view active"><div class="loader"></div></div>

  <div id="view-topics" class="view">
    <div id="topics-container"></div>
  </div>

  <div id="view-deck" class="view">
    <div id="deck-header">
      <button class="icon-btn" id="btn-back">←</button>
      <div id="header-topic-title">topic_name</div>
      <div id="deck-counter">0</div>
    </div>
    <div id="deck-container"></div>
  </div>

  <script>
	/* --- 1. ДИНАМИЧЕСКИЙ КОНФИГ ИЗ URL --- */
	const urlParams = new URLSearchParams(window.location.search);

	const CONFIG = {
	  apiKey: urlParams.get('key'),        // ищет параметр ?key=
	  spreadsheetId: urlParams.get('id')   // ищет параметр ?id=
	};

	/* --- 2. ОБНОВЛЕННЫЙ API СЛОЙ --- */
	const api = {
	  async fetchData() {
		// Проверка: если параметров нет, выводим инструкцию вместо бесконечной загрузки
		if (!CONFIG.apiKey || !CONFIG.spreadsheetId) {
		  document.getElementById('view-loading').innerHTML = `
			<div style="padding: 20px; text-align: center; color: #ff6b6b;">
			  <h3>Конфигурация не найдена</h3>
			  <p style="color: #888; font-size: 0.9rem; margin-top: 10px;">
				Пожалуйста, добавьте параметры в URL:<br>
				?key=ВАШ_КЛЮЧ&id=ID_ТАБЛИЦЫ
			  </p>
			</div>
		  `;
		  return null;
		}

		try {
		  // 1. Получаем список листов
		  const metaUrl = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.spreadsheetId}?key=${CONFIG.apiKey}`;
		  const metaResponse = await fetch(metaUrl);
		  const metaData = await metaResponse.json();
		  
		  if (metaData.error) {
			throw new Error(metaData.error.message);
		  }

		  const sheetNames = metaData.sheets.map(s => s.properties.title);
		  
		  // 2. Запрашиваем данные (batchGet)
		  const ranges = sheetNames.map(name => `${name}!A1:B1000`).join('&ranges=');
		  const dataUrl = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.spreadsheetId}/values:batchGet?key=${CONFIG.apiKey}&ranges=${ranges}`;
		  const dataResponse = await fetch(dataUrl);
		  const dataJSON = await dataResponse.json();

		  const formattedData = {};

		  dataJSON.valueRanges.forEach((range, index) => {
			const name = sheetNames[index];
			const rows = range.values || [];
			
			// Парсим строки (без удаления первой строки, чтобы не терять данные)
			const cards = rows
			  .filter(row => row.length >= 1 && row[0] && row[0] !== "text1")
			  .map(row => ({
				text1: row[0],
				text2: row[1] || "",
				res1: "", res2: ""
			  }));

			if (cards.length > 0) {
			  formattedData[name] = { name, cards };
			}
		  });

		  return formattedData;
		} catch (e) {
		  console.error("API Error:", e);
		  alert("Ошибка доступа к Google Sheets: " + e.message);
		  return null;
		}
	  }
	};

    /* 2. СОСТОЯНИЕ */
    let appData = {};
    let currentTopic = null;
    let activeCard = null;
    let dragData = { isDragging: false, startX: 0, startY: 0, currentX: 0, currentY: 0 };
    const THRESHOLD = window.innerWidth * 0.25;

    /* 3. НАВИГАЦИЯ */
    function showView(name) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById('view-' + name).classList.add('active');
    }

    /* 4. ОТРИСОВКА ТОПИКОВ */
    function renderTopics(data) {
      const container = document.getElementById('topics-container');
      container.innerHTML = '';
      Object.keys(data).forEach(id => {
        const item = document.createElement('div');
        item.className = 'topic-item';
        item.innerHTML = `<span>${data[id].name}</span><span class="topic-count">${data[id].cards.length}</span>`;
        item.onclick = () => startDeck(data[id]);
        container.appendChild(item);
      });
    }

    /* 5. ЛОГИКА КОЛОДЫ */
    function startDeck(topic) {
      currentTopic = topic;
      document.getElementById('header-topic-title').textContent = topic.name;
      document.getElementById('deck-counter').textContent = topic.cards.length;
      const container = document.getElementById('deck-container');
      container.innerHTML = '';
      
      [...topic.cards].reverse().forEach(c => container.appendChild(createCard(c)));
      showView('deck');
      bindTopCard();
    }

    function createCard(data) {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `
        <div class="card-body">
          <div class="card-main-row">
            <div class="card-text-primary">${data.text1}</div>
            <button class="play-btn">▶</button>
          </div>
          <div class="card-text-secondary">${data.text2}</div>
          <div class="card-eye-zone">
            <button class="reveal-btn">👁</button>
          </div>
        </div>
        <div class="card-actions">
          <button class="action-btn" data-swipe="left">Удалить</button>
          <button class="action-btn" data-swipe="right">В конец</button>
        </div>
      `;

      // Атомарные события
      const eye = el.querySelector('.reveal-btn');
      const secText = el.querySelector('.card-text-secondary');
      const play = el.querySelector('.play-btn');

      eye.onpointerdown = e => e.stopPropagation();
      eye.onclick = () => { eye.parentElement.style.display = 'none'; secText.style.display = 'block'; };
      
      play.onpointerdown = e => e.stopPropagation();
      play.onclick = () => console.log("Play:", data.text1);

      el.querySelectorAll('.action-btn').forEach(b => {
        b.onpointerdown = e => e.stopPropagation();
        b.onclick = () => triggerSwipe(b.dataset.swipe);
      });

      return el;
    }

    /* 6. ЖЕСТЫ */
    function bindTopCard() {
      const cards = document.querySelectorAll('.card');
      if (!cards.length) return;
      activeCard = cards[cards.length - 1];
      activeCard.style.opacity = '1';
      activeCard.style.transform = 'scale(1)';
      activeCard.onpointerdown = e => {
        dragData.isDragging = true;
        dragData.startX = e.clientX; dragData.startY = e.clientY;
        activeCard.classList.add('dragging');
        activeCard.setPointerCapture(e.pointerId);
        activeCard.onpointermove = moveEvent;
        activeCard.onpointerup = endEvent;
      };
    }

    function moveEvent(e) {
      if (!dragData.isDragging) return;
      dragData.currentX = e.clientX - dragData.startX;
      dragData.currentY = e.clientY - dragData.startY;
      activeCard.style.transform = `translate(${dragData.currentX}px, ${dragData.currentY}px) rotate(${dragData.currentX * 0.05}deg)`;
    }

    function endEvent() {
      dragData.isDragging = false;
      activeCard.classList.remove('dragging');
      if (Math.abs(dragData.currentX) > THRESHOLD) {
        triggerSwipe(dragData.currentX > 0 ? 'right' : 'left');
      } else {
        activeCard.style.transform = '';
      }
      dragData.currentX = 0; activeCard.onpointermove = null;
    }

    function triggerSwipe(dir) {
      if (!activeCard) return;
      const flyX = dir === 'right' ? window.innerWidth : -window.innerWidth;
      activeCard.style.transform = `translate(${flyX}px, ${dragData.currentY}px) rotate(${dir === 'right' ? 20 : -20}deg)`;
      activeCard.style.opacity = '0';
      
      const target = activeCard;
      if (dir === 'left') {
        const count = parseInt(document.getElementById('deck-counter').textContent);
        document.getElementById('deck-counter').textContent = count - 1;
      }

      setTimeout(() => {
        if (dir === 'left') target.remove();
        else {
          target.style.transition = 'none';
          target.style.transform = '';
          target.querySelector('.card-eye-zone').style.display = 'flex';
          target.querySelector('.card-text-secondary').style.display = 'none';
          document.getElementById('deck-container').prepend(target);
          setTimeout(() => target.style.transition = '', 50);
        }
        bindTopCard();
      }, 300);
    }

    /* 7. START */
    document.getElementById('btn-back').onclick = () => showView('topics');
    api.fetchData().then(data => { appData = data; renderTopics(data); showView('topics'); });
  </script>
</body>
</html>
