<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reword Mini</title>
    <style>
        :root {
            --bg: #0f1115;
            --card-bg: #1c1f26;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
            --border-color: rgba(255, 255, 255, 0.1);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: var(--bg); color: var(--text-main); 
            font-family: -apple-system, system-ui, sans-serif;
            overflow: hidden; height: 100vh;
        }

        .view { display: none; height: 100vh; flex-direction: column; }
        .view.active { display: flex; }

        /* Mobile Chrome: 100vh can exceed visible area (URL bar), cutting off footer. */
        @supports (height: 100dvh) {
            body { height: 100dvh; }
            .view { height: 100dvh; }
        }

        /* --- HEADER --- */
        .header { 
            padding: 18px 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }
        .header h1 { font-size: 1.1rem; margin: 0; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .back-btn { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; padding: 0 10px; }
        #deck-counter { font-variant-numeric: tabular-nums; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 8px; font-size: 0.9rem; }

        /* --- TOPICS --- */
        .topics-grid { padding: 15px; overflow-y: auto; display: grid; gap: 12px; }
        .topic-card { 
            background: var(--card-bg); padding: 18px 20px; border-radius: var(--radius-md);
            border: 1px solid var(--border-color); cursor: pointer;
            transition: transform 0.1s, border-color 0.2s, background-color 0.2s;
        }
        .topic-card:active { transform: scale(0.98); }

        /* --- CARD STAGE --- */
        #card-stage {
            position: relative; flex: 1; margin: 20px 20px 10px;
            perspective: 1000px;
        }

        .card {
            position: absolute; inset: 0;
            background-color: var(--card-bg); border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            display: flex; flex-direction: column;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            overflow: hidden;
            transform: translate3d(var(--x, 0), var(--y, 0), 0) rotate(var(--r, 0));
            touch-action: none;
            will-change: transform;
            backface-visibility: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .card.animating { transition: transform 0.4s cubic-bezier(0.15, 0.3, 0.25, 1), opacity 0.4s; }
        .card-active { z-index: 2; opacity: 1; }
        /* Avoid text blur on mobile: scaling text layers during promotion causes resampling artifacts. */
        .card-next { z-index: 1; transform: translate3d(0, 10px, 0); opacity: 0.45; }

        .card-body { flex: 1; padding: 36px 24px; display: flex; flex-direction: column; align-items: flex-start; }
        .card-text-primary { font-size: 2rem; font-weight: 700; line-height: 1.2; margin-bottom: 20px; }
        .card-text-secondary { font-size: 1.6rem; color: var(--accent); display: none; line-height: 1.3; }
        
        .card-eye-zone { flex: 1; width: 100%; display: flex; justify-content: center; align-items: center; }
        .reveal-btn {
            width: 180px; height: 180px; background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-color); border-radius: var(--radius-md);
            color: var(--text-muted); font-size: 3rem;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }

        /* --- FOOTER ACTION BAR --- */
        .footer {
            padding: 14px 16px 12px;
            display: flex; justify-content: space-between; align-items: center;
            gap: 10px;
        }
        .action-btn {
            flex: 1;
            min-height: 50px;
            padding: 0 12px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.03);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 0.92rem; font-weight: 550; letter-spacing: 0.01em;
            cursor: pointer; color: var(--text-main);
            transition: transform 0.08s, background-color 0.2s, border-color 0.2s;
            user-select: none;
        }
        .action-btn:active { transform: scale(0.988); }
        .action-btn:hover { background: rgba(255,255,255,0.05); }
        .btn-repeat,
        .btn-done,
        .btn-play {
            background: rgba(255,255,255,0.03);
            border-color: var(--border-color);
        }
        .btn-play {
            border-color: rgba(59, 130, 246, 0.28);
            color: #d4e5ff;
        }

        .play-status {
            margin: 0 16px calc(16px + env(safe-area-inset-bottom, 0px));
            padding: 8px 12px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.84rem;
            letter-spacing: 0.01em;
            min-height: 1.4em;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.02);
        }

        /* Loader */
        .loader-container { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .loader { width: 40px; height: 40px; border: 3px solid var(--border-color); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="view-loading" class="view active">
        <div class="loader-container">
            <div class="loader"></div>
            <p id="loading-msg" style="margin-top: 20px; color: var(--text-muted)">Loading decks...</p>
        </div>
    </div>

    <div id="view-topics" class="view">
        <div class="header"><h1>My Words</h1></div>
        <div id="topics-grid" class="topics-grid"></div>
    </div>

    <div id="view-deck" class="view">
        <div class="header">
            <button class="back-btn" onclick="showView('topics')">✕</button>
            <h1 id="deck-title">---</h1>
            <span id="deck-counter">0</span>
        </div>
        
        <div id="card-stage"></div>

        <div class="footer">
            <button class="action-btn btn-done" onclick="Engine.manualSwipe('left')">Done</button>
            <button class="action-btn btn-play" onclick="Engine.playActiveCard()">Play</button>
            <button class="action-btn btn-repeat" onclick="Engine.manualSwipe('right')">Repeat</button>
        </div>
        <div id="play-status" class="play-status">Ready</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const CONFIG = {
            apiKey: params.get('key'),
            sheetId: params.get('id')
        };

        let appData = {};
        let currentSession = [];

        const api = {
            async fetchData() {
                if (!CONFIG.apiKey || !CONFIG.sheetId) throw new Error("Missing URL config");
                const metaRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.sheetId}?key=${CONFIG.apiKey}`);
                const meta = await metaRes.json();
                if (meta.error) throw new Error(meta.error.message);

                const sheetNames = meta.sheets.map(s => s.properties.title);
                const ranges = sheetNames.map(name => `${name}!A1:B1000`).join('&ranges=');
                const dataRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.sheetId}/values:batchGet?key=${CONFIG.apiKey}&ranges=${ranges}`);
                const dataJSON = await dataRes.json();

                const result = {};
                dataJSON.valueRanges.forEach((range, idx) => {
                    const name = sheetNames[idx];
                    const rows = range.values || [];
                    const cards = rows.filter(row => row[0] && row[0] !== "text1").map(row => ({ text1: row[0], text2: row[1] || "" }));
                    if (cards.length > 0) result[name] = cards;
                });
                return result;
            }
        };

        const Engine = {
            THRESHOLD: 100,

            initDeck(name) {
                currentSession = [...appData[name]];
                document.getElementById('deck-title').textContent = name;
                document.getElementById('card-stage').innerHTML = '';
                this.updateCounter();
                this.spawn();
                showView('deck');
            },

            spawn() {
                const stage = document.getElementById('card-stage');
                while (stage.children.length < 2 && currentSession.length > 0) {
                    const data = currentSession.shift();
                    stage.prepend(this.createCardEl(data));
                }

                const top = stage.lastElementChild;
                if (top && !top.classList.contains('card-active')) {
                    top.className = 'card card-active animating';
                    this.bindEvents(top);
                }

                const next = stage.firstElementChild;
                if (next && next !== top) next.className = 'card card-next animating';
            },

            createCardEl(data) {
                const div = document.createElement('div');
                div.className = 'card card-next';
                div.dataset.t1 = data.text1;
                div.dataset.t2 = data.text2;
                div.innerHTML = `
                    <div class="card-body">
                        <div class="card-text-primary">${data.text1}</div>
                        <div class="card-eye-zone"><button class="reveal-btn">👁</button></div>
                        <div class="card-text-secondary">${data.text2}</div>
                    </div>
                `;
                const btn = div.querySelector('.reveal-btn');
                btn.onpointerdown = e => e.stopPropagation();
                btn.onclick = () => {
                    div.querySelector('.card-eye-zone').style.display = 'none';
                    div.querySelector('.card-text-secondary').style.display = 'block';
                };
                return div;
            },

            bindEvents(el) {
                let start = { x: 0, y: 0 };
                let current = { x: 0, y: 0 };

                const move = e => {
                    current.x = e.clientX - start.x;
                    current.y = e.clientY - start.y;
                    el.style.setProperty('--x', `${current.x}px`);
                    el.style.setProperty('--y', `${current.y}px`);
                    el.style.setProperty('--r', `${current.x * 0.05}deg`);
                };

                const up = () => {
                    document.removeEventListener('pointermove', move);
                    document.removeEventListener('pointerup', up);
                    el.classList.add('animating');
                    if (Math.abs(current.x) > this.THRESHOLD) {
                        this.swipe(el, current.x > 0 ? 'right' : 'left');
                    } else {
                        el.style.setProperty('--x', '0px');
                        el.style.setProperty('--y', '0px');
                        el.style.setProperty('--r', '0deg');
                    }
                };

                el.onpointerdown = e => {
                    if (e.target.closest('button')) return;
                    start = { x: e.clientX, y: e.clientY };
                    current = { x: 0, y: 0 };
                    el.classList.remove('animating');
                    document.addEventListener('pointermove', move);
                    document.addEventListener('pointerup', up);
                };
            },

            manualSwipe(dir) {
                const top = document.querySelector('.card-active');
                if (top) this.swipe(top, dir);
            },

            playActiveCard: async function() {
                const statusEl = document.getElementById('play-status');
                const top = document.querySelector('.card-active');
                
                if (!statusEl) return;
                if (!top) {
                    statusEl.textContent = 'No active card';
                    return;
                }

                const phrase = (top.dataset.t1 || '').trim();
                if (!phrase) {
                    statusEl.textContent = 'Empty phrase';
                    return;
                }

                // Защита от повторных кликов
                if (this._isPlaying) return;
                this._isPlaying = true;

                statusEl.textContent = 'Loading...';

                try {
                    const cacheKey = `tts-${phrase}`;
                    const cache = await caches.open('tts-audio-cache');

                    let response = await cache.match(cacheKey);

                    if (!response) {
                        statusEl.textContent = 'Generating audio...';

                        const url = `https://reword-france-463001342259.northamerica-northeast2.run.app/get_voice?phrase=${encodeURIComponent(phrase)}`;
                        
                        response = await fetch(url);

                        if (!response.ok) {
                            throw new Error(`Server returned ${response.status}`);
                        }

                        // Сохраняем в кэш браузера
                        await cache.put(cacheKey, response.clone());
                    }

                    const audioBlob = await response.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);

                    const audio = new Audio(audioUrl);
                    
                    audio.onended = () => {
                        URL.revokeObjectURL(audioUrl);
                        statusEl.textContent = '';
                        this._isPlaying = false;
                    };

                    audio.onerror = () => {
                        URL.revokeObjectURL(audioUrl);
                        statusEl.textContent = 'Playback error';
                        this._isPlaying = false;
                    };

                    await audio.play();
                    statusEl.textContent = '▶ Playing';

                } catch (error) {
                    console.error('Play error:', error);
                    statusEl.textContent = 'Failed to play';
                    this._isPlaying = false;
                }
            },

            swipe(el, dir) {
                el.classList.add('animating');
                const outX = dir === 'right' ? 1000 : -1000;
                el.style.setProperty('--x', `${outX}px`);
                el.style.opacity = '0';

                if (dir === 'right') {
                    currentSession.push({ text1: el.dataset.t1, text2: el.dataset.t2 });
                }

                setTimeout(() => {
                    el.remove();
                    this.updateCounter();
                    this.spawn();
                }, 400);
            },

            updateCounter() {
                const total = currentSession.length + document.getElementById('card-stage').children.length;
                document.getElementById('deck-counter').textContent = total;
                if (total === 0) showView('topics');
            }
        };

        function showView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${id}`).classList.add('active');
        }

        function renderTopics() {
            const grid = document.getElementById('topics-grid');
            grid.innerHTML = '';
            Object.keys(appData).forEach(name => {
                const div = document.createElement('div');
                div.className = 'topic-card';
                div.innerHTML = `<strong>${name}</strong><div style="color:var(--text-muted); font-size:0.8rem; margin-top:5px">${appData[name].length} cards</div>`;
                div.onclick = () => Engine.initDeck(name);
                grid.appendChild(div);
            });
        }

        window.onload = async () => {
            try {
                appData = await api.fetchData();
                renderTopics();
                showView('topics');
            } catch (err) {
                document.getElementById('loading-msg').innerHTML = `<span style="color:#ff6b6b">Error: ${err.message}</span>`;
            }
        };
    </script>
</body>
</html>
